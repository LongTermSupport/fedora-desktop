#version=F43
# Fedora Desktop Kickstart Configuration
# For use with: fedora-desktop Ansible automation project
# Repository: https://github.com/LongTermSupport/fedora-desktop
#
# This kickstart collects all user input in %pre via a TUI on tty6,
# clones the fedora-desktop repo during %post, then opens an interactive
# setup wizard in gnome-terminal on first GNOME login.

# ============================================================
# PRE-INSTALLATION: Collect user input via TUI
# ============================================================
%pre --interpreter=/bin/bash --log=/tmp/ks-pre.log

# No set -e here — we handle errors explicitly in the interactive loops

# --- Switch to tty6 for interactive input ---
exec < /dev/tty6 > /dev/tty6 2>/dev/tty6
chvt 6

# Increase console font size for readability (soft-fail: font may not be in initrd)
setfont latarcyrheb-sun32 2>/dev/null || true

# Load keyboard layout from kernel command line early — %pre may run before
# systemd-vconsole-setup completes. Belt-and-suspenders for correct key mapping
# during password entry (critical: wrong keymap → wrong password → locked out).
_KEYMAP=$(grep -oP 'vconsole\.keymap=\K\S+' /proc/cmdline 2>/dev/null || true)
if [[ -n "$_KEYMAP" ]]; then
    loadkeys "$_KEYMAP" 2>/dev/null || true
fi

printf '\033[2J\033[H'  # clear screen (clear not available in initrd)
echo "========================================================"
echo "  Fedora Desktop - Automated Installation Setup"
echo "========================================================"
echo ""

# --- Installation Authorization ---
# INSTALL_AUTH_HASH is substituted by setup-netinstall-boot.bash (sha256sum of the auth code).
# If still PLACEHOLDER (repo source / setup not run), the check is skipped.
INSTALL_AUTH_HASH='PLACEHOLDER'
if [[ "$INSTALL_AUTH_HASH" != "PLACEHOLDER" ]]; then
    echo "--- Installation Authorization ---"
    echo ""
    echo "WARNING: This operation will ERASE the operating system and reinstall Fedora."
    echo "An authorization code is required to continue."
    echo ""
    _KS_AUTH_OK=false
    for _attempt in 1 2 3; do
        read -r -s -p "Authorization code (attempt ${_attempt}/3): " _KS_AUTH_INPUT
        echo ""
        _KS_AUTH_HASH=$(printf '%s' "$_KS_AUTH_INPUT" | sha256sum | cut -d' ' -f1)
        if [[ "$_KS_AUTH_HASH" == "$INSTALL_AUTH_HASH" ]]; then
            _KS_AUTH_OK=true
            break
        fi
        echo "Incorrect."
        echo ""
    done
    if ! $_KS_AUTH_OK; then
        echo "Authorization failed. Aborting."
        echo "The system has NOT been modified."
        chvt 1; exec < /dev/tty1 > /dev/tty1 2>/dev/tty1; exit 1
    fi
    echo "Authorized."
    echo ""
fi

# --- WiFi Connection ---
# The setup script provides a local Workstation Live squashfs.img on the FDINST
# partition (deployed via liveimg). WiFi is still needed for the dnf install in
# %post (for the DNF installs and repo clone) and the setup wizard. Connect here or prompt interactively.
echo "--- Network Configuration ---"
echo ""

KS_WIFI_SSID=""
KS_WIFI_PASS=""

# Check if network is already up (connected via initrd overlay)
ACTIVE_WIFI=$(nmcli -t -f TYPE,NAME connection show --active 2>/dev/null | grep '^802-11-wireless:' | head -1 | cut -d: -f2)
if [[ -n "$ACTIVE_WIFI" ]]; then
    KS_WIFI_SSID=$(nmcli -t -f 802-11-wireless.ssid connection show "$ACTIVE_WIFI" 2>/dev/null | cut -d: -f2)
    KS_WIFI_PASS=$(nmcli -s -t -f 802-11-wireless-security.psk connection show "$ACTIVE_WIFI" 2>/dev/null | cut -d: -f2)
    echo "WiFi already connected: $KS_WIFI_SSID"
    echo ""
fi

# If not connected or creds not readable, prompt interactively
if [[ -z "$KS_WIFI_SSID" ]] || [[ -z "$KS_WIFI_PASS" ]]; then
    echo "WiFi not connected. Please enter credentials."
    echo ""
    while true; do
        read -r -p "WiFi SSID: " KS_WIFI_SSID
        if [[ -z "$KS_WIFI_SSID" ]]; then
            echo "SSID cannot be empty."
            continue
        fi

        read -r -s -p "WiFi password: " KS_WIFI_PASS
        echo ""

        if [[ -z "$KS_WIFI_PASS" ]]; then
            echo "Password cannot be empty."
            continue
        fi

        # Reject backslashes — GLib key-file parser treats \ as escape character
        if [[ "$KS_WIFI_PASS" =~ [\\] ]]; then
            echo "Password cannot contain backslashes (NetworkManager config limitation)."
            continue
        fi

        echo "Connecting to '$KS_WIFI_SSID'..."

        # Find the wireless interface
        WIFI_DEV=""
        for dev in /sys/class/net/*; do
            devname=$(basename "$dev")
            if [[ -d "$dev/wireless" ]] || [[ -d "$dev/phy80211" ]]; then
                WIFI_DEV="$devname"
                break
            fi
        done

        if [[ -z "$WIFI_DEV" ]]; then
            for try in wlan0 wlp0s20f3 wlp1s0 wlp2s0; do
                if nmcli device status 2>/dev/null | grep -q "^${try} "; then
                    WIFI_DEV="$try"
                    break
                fi
            done
        fi

        if [[ -z "$WIFI_DEV" ]]; then
            echo "ERROR: No wireless interface found."
            nmcli device status 2>/dev/null || ip link show 2>/dev/null || true
            echo ""
            read -r -p "Enter interface name manually (or press Enter to retry): " WIFI_DEV
            if [[ -z "$WIFI_DEV" ]]; then
                continue
            fi
        fi

        if nmcli device wifi connect "$KS_WIFI_SSID" password "$KS_WIFI_PASS" ifname "$WIFI_DEV" 2>&1; then
            echo "Waiting for connection..."
            CONNECTED=false
            for i in $(seq 1 15); do
                sleep 1
                if nmcli -t -f STATE general 2>/dev/null | grep -qi "connected"; then
                    CONNECTED=true
                    break
                fi
            done

            if $CONNECTED; then
                echo "Connected to '$KS_WIFI_SSID' successfully."
                echo ""
                break
            else
                echo "ERROR: Connection attempt timed out."
            fi
        else
            echo "ERROR: Failed to connect to '$KS_WIFI_SSID'."
        fi

        echo ""
        echo "Please check the SSID and password and try again."
        echo ""
    done
fi

# --- Mount FDINST partition for liveimg access ---
FDINST_DEV=$(blkid -t LABEL=FDINST -o device 2>/dev/null | head -1)
if [[ -z "$FDINST_DEV" ]]; then
    echo "ERROR: Cannot find FDINST partition."
    chvt 1; exec < /dev/tty1 > /dev/tty1 2>/dev/tty1; exit 1
fi
mkdir -p /mnt/fdinst
mount -o ro "$FDINST_DEV" /mnt/fdinst
SQUASHFS=$(find /mnt/fdinst -maxdepth 1 -name 'squashfs-*.img' | head -1)
if [[ -z "$SQUASHFS" ]]; then
    echo "ERROR: squashfs-*.img not found on FDINST partition."
    umount /mnt/fdinst; chvt 1; exec < /dev/tty1 > /dev/tty1 2>/dev/tty1; exit 1
fi
echo "FDINST mounted: $(basename "$SQUASHFS") found"
echo ""

# --- User Information ---
echo "--- User Configuration ---"
echo ""

while true; do
    read -r -p "Username: " KS_USERNAME
    if [[ -n "$KS_USERNAME" ]] && [[ "$KS_USERNAME" =~ ^[a-z_][a-z0-9_-]*$ ]]; then
        break
    fi
    echo "Invalid username. Use lowercase letters, numbers, hyphens, underscores."
done

read -r -p "Full name: " KS_FULLNAME
# Sanitize: remove double quotes to prevent kickstart --gecos parser issues
KS_FULLNAME="${KS_FULLNAME//\"/}"
if [[ -z "$KS_FULLNAME" ]]; then
    KS_FULLNAME="$KS_USERNAME"
fi

read -r -p "Email: " KS_EMAIL
# Sanitize: remove double quotes to prevent YAML issues in localhost.yml
KS_EMAIL="${KS_EMAIL//\"/}"

read -r -p "Hostname [fedora-desktop]: " KS_HOSTNAME
if [[ -z "$KS_HOSTNAME" ]]; then
    KS_HOSTNAME="fedora-desktop"
fi
# Validate hostname (RFC 952: alphanumeric and hyphens only)
if [[ ! "$KS_HOSTNAME" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$ ]]; then
    echo "Invalid hostname (use letters, numbers, hyphens). Using default."
    KS_HOSTNAME="fedora-desktop"
fi

echo ""
echo "--- Disk Encryption ---"
echo ""

while true; do
    read -r -s -p "LUKS disk encryption passphrase: " KS_LUKS1
    echo ""
    if [[ ${#KS_LUKS1} -lt 8 ]]; then
        echo "Passphrase must be at least 8 characters."
        continue
    fi
    # Reject chars that break kickstart's shlex parser for --passphrase=
    if [[ "$KS_LUKS1" =~ [\"\\\`] ]]; then
        echo "Passphrase cannot contain double quotes, backslashes, or backticks."
        continue
    fi
    read -r -s -p "Confirm LUKS passphrase: " KS_LUKS2
    echo ""
    if [[ "$KS_LUKS1" == "$KS_LUKS2" ]]; then
        break
    fi
    echo "Passphrases do not match. Try again."
done

echo ""
echo "--- User Password ---"
echo ""

while true; do
    read -r -s -p "User password: " KS_PASS1
    echo ""
    if [[ ${#KS_PASS1} -lt 4 ]]; then
        echo "Password must be at least 4 characters."
        continue
    fi
    read -r -s -p "Confirm user password: " KS_PASS2
    echo ""
    if [[ "$KS_PASS1" == "$KS_PASS2" ]]; then
        break
    fi
    echo "Passwords do not match. Try again."
done

echo ""
echo "--- Shell Prompt Colour ---"
echo ""
echo "Options: white whiteBold red redBold green greenBold"
echo "         yellow yellowBold blue blueBold purple purpleBold"
echo "         lightblue lightblueBold"
echo ""
read -r -p "PS1 colour [lightblueBold]: " KS_PS1_COLOUR
if [[ -z "$KS_PS1_COLOUR" ]]; then
    KS_PS1_COLOUR="lightblueBold"
fi

echo ""
echo "========================================================"
echo "  Summary"
echo "========================================================"
echo "  WiFi:       $KS_WIFI_SSID"
echo "  Username:   $KS_USERNAME"
echo "  Full name:  $KS_FULLNAME"
echo "  Email:      $KS_EMAIL"
echo "  Hostname:   $KS_HOSTNAME"
echo "  PS1 colour: $KS_PS1_COLOUR"
echo "  LUKS:       (set)"
echo "  Password:   (set)"
echo "========================================================"
echo ""
read -r -p "Proceed with installation? [Y/n] " KS_CONFIRM
if [[ "$KS_CONFIRM" =~ ^[Nn] ]]; then
    echo "Installation cancelled by user."
    chvt 1
    exec < /dev/tty1 > /dev/tty1 2>/dev/tty1
    exit 1
fi

echo ""
echo "Generating configuration..."

# --- Switch back to tty1 ---
chvt 1
exec < /dev/tty1 > /dev/tty1 2>/dev/tty1

# --- Hash user password with openssl (crypt module removed in Python 3.13) ---
KS_CRYPTPASS=$(printf '%s' "$KS_PASS1" | openssl passwd -6 -stdin)

# --- Generate partitioning fragment ---
# Write LUKS passphrase to a temp file to avoid shell expansion issues
printf '%s' "$KS_LUKS1" > /tmp/ks-luks-pass

# Adaptive partitioning: preserve FDINST (install source partition) on reinstall.
# FDINST_DEV was set earlier when mounting the install source.
# On first install (no FDINST), wipe everything and start fresh.
if [[ -n "$FDINST_DEV" ]]; then
    # REINSTALL: detect parent disk and all partitions except FDINST
    KS_FDINST_DISK=$(lsblk -no PKNAME "$FDINST_DEV" 2>/dev/null | head -1)
    KS_FDINST_NAME=$(basename "$FDINST_DEV")

    if [[ -z "$KS_FDINST_DISK" ]]; then
        echo "ERROR: Cannot detect parent disk for ${FDINST_DEV}" >&2
        chvt 1; exec < /dev/tty1 > /dev/tty1 2>/dev/tty1; exit 1
    fi

    # Build comma-separated list of partitions to clear (all on disk except FDINST).
    # clearpart --list= requires bare names (no /dev/ prefix).
    KS_PARTS_TO_CLEAR=$(lsblk -ln -o NAME "/dev/${KS_FDINST_DISK}" 2>/dev/null \
        | grep -v "^${KS_FDINST_DISK}$" \
        | grep -v "^${KS_FDINST_NAME}$" \
        | tr '\n' ',' \
        | sed 's/,$//')

    if [[ -z "$KS_PARTS_TO_CLEAR" ]]; then
        echo "ERROR: Cannot enumerate partitions on ${KS_FDINST_DISK}" >&2
        chvt 1; exec < /dev/tty1 > /dev/tty1 2>/dev/tty1; exit 1
    fi

    echo "Partitioning: preserving ${FDINST_DEV}, clearing: ${KS_PARTS_TO_CLEAR}"

    # ignoredisk + clearpart --list: wipe only OS partitions, leave FDINST alone.
    # No zerombr or --initlabel (those reinitialise the GPT and destroy FDINST).
    # --ondisk= on each part constrains new partitions to the correct disk.
    cat > /tmp/part-include << PARTEOF
ignoredisk --only-use=${KS_FDINST_DISK}
clearpart --list=${KS_PARTS_TO_CLEAR}
part /boot/efi --fstype=efi --size=600 --ondisk=${KS_FDINST_DISK}
part /boot --fstype=ext4 --size=1024 --ondisk=${KS_FDINST_DISK}
PARTEOF
    printf 'part btrfs.01 --fstype=btrfs --size=1 --grow --encrypted --luks-version=luks2 --passphrase="%s" --ondisk=%s\n' \
        "$(cat /tmp/ks-luks-pass)" "$KS_FDINST_DISK" >> /tmp/part-include
    cat >> /tmp/part-include << 'PARTEOF2'
btrfs none --label=fedora btrfs.01
btrfs / --subvol --name=root LABEL=fedora
btrfs /home --subvol --name=home LABEL=fedora
PARTEOF2
else
    # FIRST INSTALL: no FDINST found — wipe everything and start fresh
    echo "Partitioning: no FDINST found — full disk wipe (first install)"
    cat > /tmp/part-include << 'PARTEOF'
clearpart --all --initlabel --disklabel=gpt
zerombr
part /boot/efi --fstype=efi --size=600
part /boot --fstype=ext4 --size=1024
PARTEOF
    # Append the LUKS partition line — double-quoted so spaces in passphrases work
    # (pykickstart uses shlex.split which respects double-quoted values)
    printf 'part btrfs.01 --fstype=btrfs --size=1 --grow --encrypted --luks-version=luks2 --passphrase="%s"\n' \
        "$(cat /tmp/ks-luks-pass)" >> /tmp/part-include
    cat >> /tmp/part-include << 'PARTEOF2'
btrfs none --label=fedora btrfs.01
btrfs / --subvol --name=root LABEL=fedora
btrfs /home --subvol --name=home LABEL=fedora
PARTEOF2
fi
rm -f /tmp/ks-luks-pass

# --- Generate user creation fragment ---
printf 'user --name=%s --groups=wheel --gecos="%s" --password=%s --iscrypted\n' \
    "$KS_USERNAME" "$KS_FULLNAME" "$KS_CRYPTPASS" > /tmp/user-include

# --- Generate network/hostname fragment ---
printf 'network --bootproto=dhcp --device=link --activate --hostname=%s\n' \
    "$KS_HOSTNAME" > /tmp/network-include

# --- Save all variables for %post and firstboot (properly quoted for sourcing) ---
write_var() {
    printf '%s=%q\n' "$1" "$2"
}
{
    write_var KS_USERNAME "$KS_USERNAME"
    write_var KS_FULLNAME "$KS_FULLNAME"
    write_var KS_EMAIL "$KS_EMAIL"
    write_var KS_HOSTNAME "$KS_HOSTNAME"
    write_var KS_PS1_COLOUR "$KS_PS1_COLOUR"
    write_var KS_WIFI_SSID "$KS_WIFI_SSID"
    write_var KS_WIFI_PASS "$KS_WIFI_PASS"
} > /tmp/install-vars

%end

# ============================================================
# SYSTEM CONFIGURATION
# ============================================================
lang en_GB.UTF-8
keyboard --xlayouts='gb'
timezone Europe/London --utc

# Installation source: deploy Workstation Live filesystem from local squashfs.img
# (mounted in %pre from FDINST partition — fully offline, no network needed)
liveimg --url=file:///mnt/fdinst/squashfs-FEDORA_VERSION.img

# Root account locked
rootpw --lock

# SELinux and firewall
selinux --enforcing
firewall --enabled --service=ssh

# Dynamic includes from %pre
%include /tmp/part-include
%include /tmp/user-include
%include /tmp/network-include

# Bootloader
bootloader --append="rhgb quiet"

# Use text mode (ensures tty switching works reliably for %pre TUI)
text

# Reboot after installation
reboot

# ============================================================
# POST: Copy files from installer environment (nochroot)
# ============================================================
%post --nochroot --erroronfail --log=/mnt/sysimage/root/ks-post-nochroot.log
#!/bin/bash
set -euxo pipefail

echo "=== Post-install (nochroot): Copying configuration ==="

# Fix DNS resolution for chrooted %post sections
cp /etc/resolv.conf /mnt/sysimage/etc/resolv.conf

# Copy install variables to installed system
mkdir -p /mnt/sysimage/var/lib/fedora-desktop-install
cp /tmp/install-vars /mnt/sysimage/var/lib/fedora-desktop-install/install-vars
chmod 700 /mnt/sysimage/var/lib/fedora-desktop-install
chmod 600 /mnt/sysimage/var/lib/fedora-desktop-install/install-vars

echo "=== Post-install (nochroot): Complete ==="

%end

# ============================================================
# POST: System configuration (chrooted)
# ============================================================
%post --interpreter=/bin/bash --log=/root/ks-post-system.log --erroronfail
set -euxo pipefail

echo "=== Post-install (chroot): System configuration ==="

# --- Read install variables ---
source /var/lib/fedora-desktop-install/install-vars

# --- Passwordless sudo for the user ---
echo "${KS_USERNAME} ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/99-fedora-desktop-setup
chmod 440 /etc/sudoers.d/99-fedora-desktop-setup

# --- Pre-set PS1 prompt colour (avoids interactive prompt in Ansible) ---
mkdir -p /var/local
echo "export PS1_COLOUR=${KS_PS1_COLOUR}" > /var/local/ps1-prompt-colour

# --- Generate vault password ---
openssl rand -base64 32 > /var/lib/fedora-desktop-install/vault-pass.secret
chmod 600 /var/lib/fedora-desktop-install/vault-pass.secret

# --- Write minimal localhost.yml (unencrypted values only) ---
HOSTVARS_DIR="/var/lib/fedora-desktop-install"
printf 'user_login: "%s"\nuser_name: "%s"\nuser_email: "%s"\n' \
    "$KS_USERNAME" "$KS_FULLNAME" "$KS_EMAIL" > "${HOSTVARS_DIR}/localhost.yml"
chmod 600 "${HOSTVARS_DIR}/localhost.yml"

# --- Enable DNF parallel downloads ---
if ! grep -q "max_parallel_downloads" /etc/dnf/dnf.conf; then
    echo "max_parallel_downloads=10" >> /etc/dnf/dnf.conf
fi

# --- Install packages not in the Workstation Live image ---
# liveimg deploys the Live filesystem; these extras are needed by firstboot.
# Requires WiFi (connected in %pre) and DNS (resolv.conf copied in nochroot %post).
# NOTE: ansible-core is NOT installed here — firstboot installs the full ansible
# via pipx (matching the run.bash workflow). Installing both causes pipx to warn
# "ansible is already on PATH" and creates a confusing dual-install.
dnf install -y --setopt=install_weak_deps=False \
    python3-libdnf5 \
    python3-pip \
    pipx \
    gh \
    htop \
    ripgrep \
    jq \
    grubby

# --- Configure WiFi as persistent NetworkManager connection file ---
# nmcli does not work in chroot (no running NetworkManager daemon),
# so we write the connection file directly.
WIFI_CONN_DIR="/etc/NetworkManager/system-connections"
mkdir -p "$WIFI_CONN_DIR"
WIFI_CONN_FILE="${WIFI_CONN_DIR}/kickstart-wifi.nmconnection"
# Use printf for SSID/password to avoid shell expansion issues with special chars
cat > "$WIFI_CONN_FILE" << 'WIFIEOF'
[connection]
id=kickstart-wifi
type=wifi
autoconnect=true

[wifi]
WIFIEOF
printf 'ssid=%s\n' "$KS_WIFI_SSID" >> "$WIFI_CONN_FILE"
cat >> "$WIFI_CONN_FILE" << 'WIFIEOF2'
mode=infrastructure

[wifi-security]
key-mgmt=wpa-psk
WIFIEOF2
printf 'psk=%s\n' "$KS_WIFI_PASS" >> "$WIFI_CONN_FILE"
cat >> "$WIFI_CONN_FILE" << 'WIFIEOF3'

[ipv4]
method=auto

[ipv6]
method=auto
WIFIEOF3
chmod 600 "$WIFI_CONN_FILE"

# --- Copy install config to user-readable location (wizard will read these) ---
INSTALL_SRC="/var/lib/fedora-desktop-install"
USER_INSTALL_DIR="/home/${KS_USERNAME}/.local/share/fedora-desktop-install"
mkdir -p "$USER_INSTALL_DIR"
cp "${INSTALL_SRC}/vault-pass.secret" "${USER_INSTALL_DIR}/vault-pass.secret" \
    || { echo "ERROR: Failed to copy vault-pass.secret to user dir"; exit 1; }
cp "${INSTALL_SRC}/localhost.yml" "${USER_INSTALL_DIR}/localhost.yml" \
    || { echo "ERROR: Failed to copy localhost.yml to user dir"; exit 1; }
# Chown the entire ~/.local tree — mkdir -p above created .local/ and .local/share/
# as root. Only chowning the leaf dir leaves the parents root-owned, which breaks
# pipx (it can't create ~/.local/state/) when run.bash runs on first login.
chown -R "${KS_USERNAME}:${KS_USERNAME}" "/home/${KS_USERNAME}/.local"
chmod 700 "$USER_INSTALL_DIR"
chmod 600 "${USER_INSTALL_DIR}/vault-pass.secret" "${USER_INSTALL_DIR}/localhost.yml"

# --- Pre-clone repository during install (non-fatal — wizard handles failures) ---
# Network is available (WiFi connected in %pre, used for DNF installs above).
# Cloning now means the wizard can skip straight to Ansible install on first login.
SETUP_BRANCH="F43"
SETUP_REPO="https://github.com/LongTermSupport/fedora-desktop.git"
SETUP_DIR="/home/${KS_USERNAME}/Projects/fedora-desktop"
echo "Pre-cloning fedora-desktop repository..."
if su - "${KS_USERNAME}" -c "
    set -euo pipefail
    mkdir -p ~/Projects
    if [[ ! -d '${SETUP_DIR}' ]]; then
        git clone -b '${SETUP_BRANCH}' '${SETUP_REPO}' '${SETUP_DIR}'
    else
        cd '${SETUP_DIR}'
        git fetch origin
        git reset --hard 'origin/${SETUP_BRANCH}'
    fi
"; then
    echo "Repository cloned — copying Ansible configuration into place..."
    # Only copy localhost.yml — vault-pass.secret is intentionally NOT pre-populated.
    # run.bash owns vault setup: it will prompt for the real password on first login.
    # Pre-populating with the kickstart-generated password causes a mismatch when
    # restoring from a config repo that has !vault-encrypted values.
    cp "${USER_INSTALL_DIR}/localhost.yml" "${SETUP_DIR}/environment/localhost/host_vars/localhost.yml" \
        || { echo "ERROR: Failed to copy localhost.yml into repo"; exit 1; }
    chown "${KS_USERNAME}:${KS_USERNAME}" \
        "${SETUP_DIR}/environment/localhost/host_vars/localhost.yml"
    chmod 600 \
        "${SETUP_DIR}/environment/localhost/host_vars/localhost.yml"
    mkdir -p "${SETUP_DIR}/untracked/facts"
    chown -R "${KS_USERNAME}:${KS_USERNAME}" "${SETUP_DIR}/untracked"
    echo "Ansible configuration ready — wizard will start at Ansible install."
else
    echo "INFO: Pre-clone failed (network issue?) — wizard will clone on first login."
fi

# --- Autostart wrapper: runs run.bash from the cloned repo on first login ---
cat > /usr/local/bin/fedora-desktop-autostart.bash << 'AUTOSTART_SCRIPT'
#!/bin/bash
# No-op if setup is already complete
[[ -f "$HOME/.local/state/fedora-desktop-setup-complete" ]] && exit 0

SETUP_DIR="$HOME/Projects/fedora-desktop"
SETUP_REPO="https://github.com/LongTermSupport/fedora-desktop.git"
SETUP_BRANCH="F43"

# Launch a terminal running the given bash -c command.
# Uses exec so the terminal process replaces this shell (GNOME session tracks it).
# Tries terminals in order of preference for Fedora 43.
launch_terminal() {
    local cmd="$1"
    if command -v ptyxis > /dev/null; then
        exec ptyxis -- bash -c "$cmd"
    elif command -v gnome-terminal > /dev/null; then
        exec gnome-terminal --title="Fedora Desktop Setup" -- bash -c "$cmd"
    elif command -v xterm > /dev/null; then
        exec xterm -T "Fedora Desktop Setup" -e bash -c "$cmd"
    else
        echo "ERROR: No terminal emulator found (tried ptyxis, gnome-terminal, xterm)" >&2
        exit 1
    fi
}

if [[ ! -d "$SETUP_DIR" ]]; then
    launch_terminal "
        echo 'Repository not found — cloning now...'
        mkdir -p \"\$(dirname '$SETUP_DIR')\"
        git clone -b '$SETUP_BRANCH' '$SETUP_REPO' '$SETUP_DIR' \
            || { echo 'Clone failed — check network, then re-log in to retry'; exec bash; }
        cd '$SETUP_DIR'
        ./run.bash
        exec bash
    "
else
    launch_terminal "cd '$SETUP_DIR' && ./run.bash; exec bash"
fi
AUTOSTART_SCRIPT
chmod +x /usr/local/bin/fedora-desktop-autostart.bash

# --- Ensure system boots to GNOME (liveimg may not set graphical target) ---
systemctl set-default graphical.target
systemctl enable gdm.service

# --- Set larger default console font (readable if GNOME fails to start) ---
grep -q '^FONT=' /etc/vconsole.conf 2>/dev/null || echo 'FONT=latarcyrheb-sun32' >> /etc/vconsole.conf

# --- GNOME autostart: opens setup wizard in a terminal on first login ---
mkdir -p "/home/${KS_USERNAME}/.config/autostart"
cat > "/home/${KS_USERNAME}/.config/autostart/fedora-desktop-setup.desktop" << 'AUTOSTART_EOF'
[Desktop Entry]
Type=Application
Name=Fedora Desktop Setup
Comment=Interactive first-boot setup wizard
Exec=/usr/local/bin/fedora-desktop-autostart.bash
X-GNOME-Autostart-enabled=true
NoDisplay=true
AUTOSTART_EOF
chown -R "${KS_USERNAME}:${KS_USERNAME}" "/home/${KS_USERNAME}/.config"
chmod 644 "/home/${KS_USERNAME}/.config/autostart/fedora-desktop-setup.desktop"

echo "=== Post-install (chroot): Complete ==="
echo "Setup wizard: /usr/local/bin/fedora-desktop-autostart.bash"
echo "GNOME autostart will launch wizard in gnome-terminal on first login."

%end

# ============================================================
# ERROR HANDLING
# ============================================================
%onerror
#!/bin/bash
echo "=== KICKSTART ERROR ==="
echo "An error occurred during the Kickstart installation."
echo "Check /tmp/ks-pre.log and /root/ks-post-*.log for details."
echo "======================="
%end
