# vsftpd configuration — Camera FTP uploads
# Managed by Ansible: playbooks/imports/optional/common/play-ftp-camera.yml
#
# This server is NOT started automatically. Use the ftp-camera wrapper script:
#   ftp-camera        # starts server, monitors uploads, Ctrl+C to stop

listen=YES
listen_ipv6=NO

# Authentication — local users only, no anonymous access
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Restrict logins to the allowlist in camera-users.txt (camera user only)
userlist_enable=YES
userlist_file=/etc/vsftpd/camera-users.txt
userlist_deny=NO

# Chroot camera user to their home directory (which is the upload directory)
# allow_writeable_chroot is required because the chroot dir is the upload target
chroot_local_user=YES
allow_writeable_chroot=YES

# Passive mode — recommended for camera connections behind a router/firewall
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30100

# Required by vsftpd for security isolation
secure_chroot_dir=/var/run/vsftpd/empty

# PAM authentication
pam_service_name=vsftpd

# Transfer logging
xferlog_enable=YES
xferlog_std_format=NO
vsftpd_log_file=/var/log/vsftpd.log
