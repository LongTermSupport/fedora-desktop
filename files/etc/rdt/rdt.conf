# rdt — Remote Desktop Toggle configuration
#
# Sourced by /home/<user>/.local/bin/rdt before evaluating its arguments.
# You MUST set ALLOWED_CIDRS to your LAN range(s) before the toggle will open
# the firewall. There is no default — deliberate configuration is enforced so
# we never expose RDP to a range you did not approve.

# Space-separated list of IPv4 CIDRs allowed to reach RDP while toggled ON.
#
# Examples (replace placeholders with your actual network values):
#   ALLOWED_CIDRS="<lan-network>/24"
#   ALLOWED_CIDRS="<lan-network>/24 <vpn-network>/24"
#
# If you want all three RFC1918 reserved-private blocks, list them here
# explicitly per your own network policy.
ALLOWED_CIDRS=""
