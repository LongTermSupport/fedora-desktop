#!/usr/bin/env ansible-playbook
---
#!/usr/bin/env ansible-playbook
- hosts: desktop
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
  tasks:
    # @see https://pkg.cloudflareclient.com/#rhel
    - name: Install Repo
      ansible.builtin.shell: |
        curl -fsSl https://pkg.cloudflareclient.com/cloudflare-warp-ascii.repo | sudo tee /etc/yum.repos.d/cloudflare-warp.repo
        dnf update
      args:
        executable: /bin/bash
        creates: /etc/yum.repos.d/cloudflare-warp.repo

    - name: Install
      ansible.builtin.dnf:
        name: cloudflare-warp
        state: latest

    # @see https://developers.cloudflare.com/warp-client/get-started/linux/
    # Probe-then-act: detect existing registration by exit code of
    # `registration show` instead of grepping output for a specific string
    # (Cloudflare changes the output format between releases, which silently
    # broke the previous grep-based check).
    - name: Probe existing Warp registration
      ansible.builtin.command: warp-cli --accept-tos registration show
      register: _warp_reg_show
      failed_when: false  # FAIL-FAST-OK: probe-then-act — rc drives next task
      changed_when: false
      become: true
      become_user: "{{ user_login }}"

    - name: Delete existing Warp registration before re-creating
      ansible.builtin.command: warp-cli --accept-tos registration delete
      when: _warp_reg_show.rc == 0
      become: true
      become_user: "{{ user_login }}"

    - name: Configure
      become: true
      become_user: "{{ user_login }}"
      ansible.builtin.shell: |
        set -ex
        yes | warp-cli --accept-tos registration new
        warp-cli --accept-tos connect
        warp-cli --accept-tos mode doh
        warp-cli --accept-tos dns families malware
      args:
        executable: /bin/bash
    - name: Systemd Resolved Config
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf
        content: |
          [Resolve]
          DNS=127.0.2.2 127.0.2.3
          ResolveUnicastSingleLabel=yes
#      notify: resolved-reload

