#!/usr/bin/env ansible-playbook
---
- hosts: desktop
  name: Install Camera FTP Server (Sony A7V)
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
    # Upload directory — override in environment/localhost/host_vars/localhost.yml
    # Uses /srv/ to avoid path traversal issues (home dirs are mode 700)
    ftp_camera_upload_dir: "/srv/ftp-camera"
    ftp_camera_user: camera
    # Legacy upload dir from before the ftp-camera/ftp-camera naming alignment.
    # Used by the migration task below to move existing data into the new path.
    ftp_camera_upload_dir_legacy: "/srv/camera-ftp"

    # NOTE: ftp_camera_rclone_remote is intentionally NOT defined here.
    # Play `vars:` have HIGHER precedence than inventory host_vars, so setting
    # a default here would silently override the user's host_vars setting.
    # The variable is consumed via `| default('')` at the use sites below.
    # Set it in environment/localhost/host_vars/localhost.yml, e.g.:
    #   ftp_camera_rclone_remote: "LTS-G-Drive:/PHOTO/LIBRARY"
    # MUST point at the library ROOT (the parent of photos/ and videos/),
    # not at a media subfolder — ftp-camera --push/--copy ships the whole
    # local tree (photos/ and videos/ siblings) in one call.

  tasks:

    # Optional playbook: skip cleanly (no-op) when the FTP password hasn't
    # been configured, instead of failing the whole optional run. Users who
    # don't use the camera FTP feature shouldn't have to vault a dummy
    # value just to let the --optional-only flow proceed.
    - name: Skip if ftp_camera_password is not configured
      when: (ftp_camera_password | default('') | length) == 0
      block:
        - name: Inform user the Camera FTP play was skipped
          ansible.builtin.debug:
            msg: |
              Camera FTP Server skipped — ftp_camera_password is not set in vault.

              To enable this feature, set the password and re-run:
                ./vault.bash set ftp_camera_password
                ./run.bash --optional-only

        - name: End play (ftp_camera_password not configured)
          ansible.builtin.meta: end_play

    # Migration: align upload dir name with the rest of the toolchain
    # (ftp-camera command, /etc/ftp-camera/, play-ftp-camera.yml).
    # Runs only when the legacy default path (/srv/camera-ftp) exists and the
    # new path (/srv/ftp-camera) does not. Skipped silently if the user
    # overrode ftp_camera_upload_dir to a custom location.
    - name: Migrate legacy upload directory (camera-ftp → ftp-camera)
      when:
        - ftp_camera_upload_dir == "/srv/ftp-camera"
        - ftp_camera_upload_dir_legacy != ftp_camera_upload_dir
      block:
        - name: Stat legacy upload directory
          ansible.builtin.stat:
            path: "{{ ftp_camera_upload_dir_legacy }}"
          register: legacy_upload_dir

        - name: Stat new upload directory
          ansible.builtin.stat:
            path: "{{ ftp_camera_upload_dir }}"
          register: new_upload_dir

        - name: Rename legacy upload directory to new path
          ansible.builtin.command:
            cmd: mv "{{ ftp_camera_upload_dir_legacy }}" "{{ ftp_camera_upload_dir }}"
          when:
            - legacy_upload_dir.stat.exists
            - not new_upload_dir.stat.exists

        - name: Remove old SELinux file context for legacy path
          community.general.sefcontext:
            target: "{{ ftp_camera_upload_dir_legacy }}(/.*)?"
            setype: public_content_rw_t
            state: absent
          failed_when: false  # FAIL-FAST-OK: legacy context may already be removed

    - name: Install vsftpd and inotify-tools
      ansible.builtin.package:
        name:
          - vsftpd         # FTP server
          - inotify-tools  # File system event monitoring (used by ftp-camera wrapper)
        state: present
      tags: packages

    - name: Create camera FTP user
      ansible.builtin.user:
        name: "{{ ftp_camera_user }}"
        password: "{{ ftp_camera_password | password_hash('sha512') }}"
        home: "{{ ftp_camera_upload_dir }}"
        shell: /sbin/nologin
        create_home: false
        comment: "Camera FTP upload user — managed by Ansible"
      no_log: true

    - name: Ensure /sbin/nologin is listed in /etc/shells (required for FTP auth via PAM)
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: /sbin/nologin
        state: present

    - name: Create camera FTP upload directory
      ansible.builtin.file:
        path: "{{ ftp_camera_upload_dir }}"
        state: directory
        owner: "{{ ftp_camera_user }}"
        group: "{{ ftp_camera_user }}"
        mode: "0775"

    - name: Add {{ user_login }} to camera group for upload directory access
      ansible.builtin.user:
        name: "{{ user_login }}"
        groups: "{{ ftp_camera_user }}"
        append: true

    - name: Grant {{ user_login }} full access to upload directory (ACL, recursive)
      ansible.posix.acl:
        path: "{{ ftp_camera_upload_dir }}"
        entity: "{{ user_login }}"
        etype: user
        permissions: rwX
        recursive: true
        state: present

    - name: Set default ACL so new files inherit {{ user_login }} access
      # Ensures uploaded files and RAW editor sidecars are all accessible
      ansible.posix.acl:
        path: "{{ ftp_camera_upload_dir }}"
        entity: "{{ user_login }}"
        etype: user
        permissions: rwX
        default: true
        state: present

    - name: Deploy vsftpd configuration
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/etc/vsftpd/vsftpd.conf"
        dest: /etc/vsftpd/vsftpd.conf
        owner: root
        group: root
        mode: "0600"
      notify: Restart vsftpd if running

    - name: Deploy vsftpd camera user allowlist
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/etc/vsftpd/camera-users.txt"
        dest: /etc/vsftpd/camera-users.txt
        owner: root
        group: root
        mode: "0644"

    - name: Deploy tmpfiles.d entry for vsftpd secure chroot dir (survives reboots)
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/etc/tmpfiles.d/vsftpd-camera.conf"
        dest: /etc/tmpfiles.d/vsftpd-camera.conf
        owner: root
        group: root
        mode: "0644"

    - name: Create vsftpd secure chroot dir now (tmpfiles.d only fires at boot)
      ansible.builtin.command:
        cmd: systemd-tmpfiles --create /etc/tmpfiles.d/vsftpd-camera.conf
      changed_when: true

    - name: Set SELinux file context on upload directory (allows vsftpd write access)
      # public_content_rw_t is the designated type for FTP-writable directories.
      # This is targeted: only the upload dir gets FTP access, not the whole system.
      community.general.sefcontext:
        target: "{{ ftp_camera_upload_dir }}(/.*)?"
        setype: public_content_rw_t
        state: present

    - name: Apply SELinux file context to upload directory
      ansible.builtin.command:
        cmd: "restorecon -R {{ ftp_camera_upload_dir }}"
      changed_when: true

    - name: Enable SELinux boolean for vsftpd passive mode
      # Without this, SELinux blocks vsftpd from binding to passive data ports
      # (30000-30100), causing camera connections to fail after authentication
      ansible.posix.seboolean:
        name: ftpd_use_passive_mode
        state: true
        persistent: true

    - name: Disable vsftpd auto-start (managed manually via ftp-camera script)
      ansible.builtin.systemd:
        name: vsftpd
        enabled: false
        state: stopped
      failed_when: false  # FAIL-FAST-OK: vsftpd may not be running on first install

    - name: Install ftp-camera wrapper script
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/home/.local/bin/ftp-camera"
        dest: "/home/{{ user_login }}/.local/bin/ftp-camera"
        owner: "{{ user_login }}"
        group: "{{ user_login }}"
        mode: "0755"

    - name: Create /etc/ftp-camera config directory
      ansible.builtin.file:
        path: /etc/ftp-camera
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy ftp-camera config (records repo path and rclone destination)
      # REPO_PATH lets `ftp-camera --pass` find vault.bash and decrypt
      # ftp_camera_password from the user's clone of this repo without
      # hardcoding the path in the script.
      # RCLONE_REMOTE is consumed by `ftp-camera --push` to know where to
      # upload sorted files. Empty value disables --push with a clear error.
      ansible.builtin.copy:
        dest: /etc/ftp-camera/config
        content: |
          # Auto-generated by play-ftp-camera.yml — do not edit manually.
          # Used by `ftp-camera --pass` to locate the vault helper, and by
          # `ftp-camera --push` to know which rclone remote to upload to.
          REPO_PATH={{ root_dir | realpath }}
          RCLONE_REMOTE={{ ftp_camera_rclone_remote | default('') }}
        owner: root
        group: root
        mode: "0644"

    - name: Display installation summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          Camera FTP Server Installed
          ============================================================

          Upload directory:  {{ ftp_camera_upload_dir }}
          FTP user:          camera  (password set in vault)

          Commands:
            ftp-camera                start FTP server (default)
            ftp-camera --pass         print FTP password (for camera setup)
            ftp-camera --sort         sort already-uploaded files by EXIF date
            ftp-camera --push         direct push to rclone remote (synchronous)
            ftp-camera --copy         copy via mount + verify (caches locally)
                                      (--push and --copy require ftp_camera_rclone_remote)
            ftp-camera --prune        remove RAW files whose JPG has been deleted
            ftp-camera --async        sort each upload by EXIF the moment it arrives
            ftp-camera --async-copy   sort + copy each upload into the local rclone
                                      mount (VFS uploads to remote in background;
                                      requires ftp_camera_rclone_remote)

          Optional rclone push: set ftp_camera_rclone_remote in host_vars
          to enable --push, --copy, and --async-copy. Must point at the library ROOT
          (the parent of photos/ and videos/), e.g. "LTS-G-Drive:/PHOTO/LIBRARY".
          Currently configured: {{ ftp_camera_rclone_remote | default('(unset)') }}

          Sort layout (mirrors library):
            photos/YYYY/MM/DD/{JPG,RAW}/<file>
            videos/YYYY/MM/DD/{MP4,MOV}/<file>

          The script will print your PC's IP address and the exact
          camera menu path when it starts.

          Sony A7V camera setup (one-time, manual):
            Menu → Network → FTP Transfer Func. → Server Settings
              Server:           <shown by ftp-camera on start>
              Port:             21
              User:             camera
              Passive Mode:     On
              Destination:      /

          Note: camera and PC must be on the same Wi-Fi network.
          Note: log out and back in for group membership to take effect.
          ============================================================

  handlers:
    - name: Restart vsftpd if running
      ansible.builtin.systemd:
        name: vsftpd
        state: restarted
      failed_when: false  # FAIL-FAST-OK: vsftpd is intentionally stopped; only restart if it was already up
