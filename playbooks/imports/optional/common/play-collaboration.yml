#!/usr/bin/env ansible-playbook
---
# Collaboration tools — terminal sharing, pair programming, remote debugging
#
# One play for all collaboration tooling. Add new tools as their own
# clearly-marked section below (── tool-name ──) so related tools stay
# together instead of proliferating separate playbooks.
- hosts: desktop
  name: Collaboration Tools
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
  tasks:
    # ── tmate ──────────────────────────────────────────────────────────────────
    # Instant terminal sharing via SSH URL. Wrapper scripts default to
    # read-only sharing for security.
    # @see https://tmate.io/

    - name: Install tmate
      ansible.builtin.dnf:
        name:
          - tmate
        state: present
      tags:
        - tmate

    - name: Deploy tmate wrapper scripts
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/home/.local/bin/{{ item }}"
        dest: /home/{{ user_login }}/.local/bin/{{ item }}
        owner: "{{ user_login }}"
        group: "{{ user_login }}"
        mode: "0755"
      loop:
        - tmate-share
        - tmate-full
      tags:
        - tmate

    # ── add more collaboration tools below ─────────────────────────────────────
    # Example candidates: rustdesk, asciinema, vs-code-live-share helpers,
    # sunshine/moonlight, waypipe. Give each its own section with a tag
    # matching the tool name so it can be run in isolation.

    # ── Post-Install Info ──────────────────────────────────────────────────────

    - name: Show Collaboration Tools Usage
      ansible.builtin.debug:
        msg:
          - ""
          - "Collaboration tools installed!"
          - ""
          - "  tmate — share terminal (read-only URLs only, secure default):"
          - "    tmate-share"
          - ""
          - "  tmate — share terminal (all URLs including read-write):"
          - "    tmate-full"
          - ""
          - "  tmate — raw (no wrapper):"
          - "    tmate"
          - ""
          - "  @see https://tmate.io/"
          - ""
