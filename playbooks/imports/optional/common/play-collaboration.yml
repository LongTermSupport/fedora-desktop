#!/usr/bin/env ansible-playbook
---
# Collaboration tools — terminal sharing, pair programming, remote debugging
#
# tmate: shares your terminal session with a unique SSH URL.
# Wrapper scripts default to read-only sharing for security.
# @see https://tmate.io/
- hosts: desktop
  name: Collaboration Tools
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
  tasks:
    # ── Packages ───────────────────────────────────────────────────────────────

    - name: Install tmate
      ansible.builtin.dnf:
        name:
          - tmate
        state: present

    # ── Wrapper Scripts ────────────────────────────────────────────────────────

    - name: Deploy tmate wrapper scripts
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/home/.local/bin/{{ item }}"
        dest: /home/{{ user_login }}/.local/bin/{{ item }}
        owner: "{{ user_login }}"
        group: "{{ user_login }}"
        mode: "0755"
      loop:
        - tmate-share
        - tmate-full

    # ── Post-Install Info ──────────────────────────────────────────────────────

    - name: Show Collaboration Tools Usage
      ansible.builtin.debug:
        msg:
          - ""
          - "Collaboration tools installed!"
          - ""
          - "  Share terminal (read-only URLs only — secure default):"
          - "    tmate-share"
          - ""
          - "  Share terminal (all URLs including read-write):"
          - "    tmate-full"
          - ""
          - "  Raw tmate (no wrapper):"
          - "    tmate"
          - ""
          - "  @see https://tmate.io/"
          - ""
