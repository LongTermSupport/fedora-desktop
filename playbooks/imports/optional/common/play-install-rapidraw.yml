#!/usr/bin/env ansible-playbook
---
- hosts: desktop
  name: Install RapidRAW - GPU-Accelerated RAW Photo Editor
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
    # Hardcoded version for security and reproducibility
    # @see https://github.com/CyberTimon/RapidRAW/releases
    rapidraw_version: "1.5.2"
    rapidraw_rpm: "03_RapidRAW_v{{ rapidraw_version }}_ubuntu-22.04_x86_64.rpm"
    rapidraw_url: "https://github.com/CyberTimon/RapidRAW/releases/download/v{{ rapidraw_version }}/{{ rapidraw_rpm }}"
    rapidraw_sha256: "89cf392824e8e2d45beaac092f3b13e315611d4966cdd5aeea93f9b7c2738614"
    rapidraw_tmp: "/tmp/{{ rapidraw_rpm }}"

  tasks:
    - name: Check if RapidRAW is already installed at target version
      ansible.builtin.shell: |
        rpm -q rapidraw --queryformat '%{VERSION}' 2>/dev/null || echo "not-installed"
      register: rapidraw_installed_version
      changed_when: false

    - name: Download RapidRAW RPM
      ansible.builtin.get_url:
        url: "{{ rapidraw_url }}"
        dest: "{{ rapidraw_tmp }}"
        checksum: "sha256:{{ rapidraw_sha256 }}"
        mode: "0644"
      when: rapidraw_installed_version.stdout != rapidraw_version

    - name: Install RapidRAW RPM
      ansible.builtin.dnf:
        name: "{{ rapidraw_tmp }}"
        state: present
        disable_gpg_check: true  # Community release, no GPG key
      when: rapidraw_installed_version.stdout != rapidraw_version

    - name: Clean up downloaded RPM
      ansible.builtin.file:
        path: "{{ rapidraw_tmp }}"
        state: absent
      when: rapidraw_installed_version.stdout != rapidraw_version

    - name: Display installation summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "RapidRAW v{{ rapidraw_version }} Installation Complete!"
          - "============================================"
          - ""
          - "GPU acceleration: wgpu (Vulkan on Linux)"
          - "  RapidRAW uses Vulkan via wgpu for GPU-accelerated processing."
          - "  NOTE: On first launch, it defaults to 'Compatibility Mode'."
          - "  For full GPU performance, disable it in:"
          - "    Settings > Processing > Compatibility Mode (toggle off)"
          - ""
          - "Launch: rapidraw"
          - "Or find it in the applications menu."
          - ""
          - "GitHub: https://github.com/CyberTimon/RapidRAW"
