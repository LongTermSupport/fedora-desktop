#!/usr/bin/env ansible-playbook
---
- hosts: desktop
  name: Install Photography Tools
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
    # RapidRAW - hardcoded version for security and reproducibility
    # @see https://github.com/CyberTimon/RapidRAW/releases
    rapidraw_version: "1.5.3"
    rapidraw_rpm: "03_RapidRAW_v{{ rapidraw_version }}_ubuntu-22.04_x86_64.rpm"
    rapidraw_url: "https://github.com/CyberTimon/RapidRAW/releases/download/v{{ rapidraw_version }}/{{ rapidraw_rpm }}"
    rapidraw_sha256: "4efc732a38aa33a4ac806697b5b748fe3f99ecf9ab80880af8b85b339b972e33"
    rapidraw_tmp: "/tmp/{{ rapidraw_rpm }}"
    # ART - hardcoded version for security and reproducibility
    # @see https://artraweditor.github.io/ | https://github.com/artraweditor/ART/releases
    art_version: "1.26.3"
    art_appimage: "ART-{{ art_version }}-x86_64.AppImage"
    art_url: "https://github.com/artraweditor/ART/releases/download/{{ art_version }}/{{ art_appimage }}"
    art_sha256: "6c072495b39bb30219bc71d656b6f7557830259e2f34b9f17d3d6ece3355eede"
    art_install_path: "/opt/{{ art_appimage }}"

  tasks:
    - name: Install Photography Packages
      ansible.builtin.package:
        name:
          # RAW processing
          - rawtherapee          # Advanced RAW processor with batch support
          - darktable            # Non-destructive RAW workflow + digital asset management
          # Pixel editing
          - gimp                 # Full-featured image editor for retouching and compositing
          # Photo management / cataloging
          - digikam              # Feature-rich photo manager with face recognition and tagging
          # Panorama and lens correction
          - hugin                # Panorama stitcher and lens calibration tool
          # Image viewing
          - geeqie               # Lightweight image viewer with RAW support and EXIF display
          # Metadata inspection
          - perl-Image-ExifTool  # CLI tool for reading/writing EXIF/IPTC/XMP metadata
        state: present
      tags: photography

    # RapidRAW: GPU-accelerated RAW editor (wgpu/Vulkan). Installed as native RPM
    # rather than Flatpak to avoid NVIDIA DMA-buf blank window bug and Vulkan
    # driver version mismatch issues inside the Flatpak sandbox.
    - name: Check if RapidRAW is already installed at target version
      ansible.builtin.shell: |
        rpm -q rapidraw --queryformat '%{VERSION}' 2>/dev/null || echo "not-installed"
      register: rapidraw_installed_version
      changed_when: false
      tags: rapidraw

    - name: Download RapidRAW RPM
      ansible.builtin.get_url:
        url: "{{ rapidraw_url }}"
        dest: "{{ rapidraw_tmp }}"
        checksum: "sha256:{{ rapidraw_sha256 }}"
        mode: "0644"
      when: rapidraw_installed_version.stdout != rapidraw_version
      tags: rapidraw

    - name: Install RapidRAW RPM
      ansible.builtin.dnf:
        name: "{{ rapidraw_tmp }}"
        state: present
        disable_gpg_check: true  # Community release, no GPG key
      when: rapidraw_installed_version.stdout != rapidraw_version
      tags: rapidraw

    - name: Clean up RapidRAW RPM
      ansible.builtin.file:
        path: "{{ rapidraw_tmp }}"
        state: absent
      when: rapidraw_installed_version.stdout != rapidraw_version
      tags: rapidraw

    # ART: Advanced RAW editor (ART fork of RawTherapee) with improved tone mapping
    # and masking. Installed as AppImage since no official RPM is available.
    - name: Check if ART is already installed at target version
      ansible.builtin.stat:
        path: "{{ art_install_path }}"
      register: art_stat
      changed_when: false
      tags: art

    - name: Download ART AppImage
      ansible.builtin.get_url:
        url: "{{ art_url }}"
        dest: "{{ art_install_path }}"
        checksum: "sha256:{{ art_sha256 }}"
        mode: "0755"
      when: not art_stat.stat.exists
      tags: art

    - name: Create ART symlink in /usr/local/bin
      ansible.builtin.file:
        src: "{{ art_install_path }}"
        dest: "/usr/local/bin/ART"
        state: link
      tags: art

    - name: Download ART icon
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/artraweditor/ART/master/rtdata/images/png/ART-logo-256.png"
        dest: /usr/share/pixmaps/ART.png
        mode: "0644"
      tags: art

    - name: Create ART desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/ART.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=ART
          Comment=Advanced RAW photo editor
          Exec=/usr/local/bin/ART %f
          Icon=ART
          Terminal=false
          Type=Application
          Categories=Graphics;Photography;RasterGraphics;
          MimeType=image/x-nikon-nef;image/x-canon-cr2;image/x-canon-crw;image/x-adobe-dng;image/x-fuji-raf;image/tiff;image/jpeg;
      tags: art

    - name: Display Installation Complete Message
      ansible.builtin.debug:
        msg: |
          Photography tools installed:
            rawtherapee          - RAW photo processor with advanced colour management
            darktable            - Non-destructive RAW workflow and digital asset manager
            gimp                 - Pixel editor for retouching and compositing
            digikam              - Photo cataloger with face recognition and tag management
            geeqie               - Lightweight image viewer with RAW support and EXIF display
            hugin                - Panorama stitching and lens calibration
            perl-Image-ExifTool  - CLI EXIF/IPTC/XMP metadata reader/writer (exiftool)
            rapidraw             - GPU-accelerated RAW editor (wgpu/Vulkan)
                                   NOTE: disable Compatibility Mode in Settings > Processing
                                   on first launch for full GPU performance
            ART                  - Advanced RAW editor (ART fork of RawTherapee)
                                   with improved tone mapping, masking, and local edits

          Launch from the applications menu, or on the command line:
            rawtherapee
            darktable
            gimp
            digikam
            geeqie
            hugin
            exiftool <file>
            rapidraw
            ART
