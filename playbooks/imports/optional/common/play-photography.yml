#!/usr/bin/env ansible-playbook
---
- hosts: desktop
  name: Install Photography Tools
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
    # RapidRAW - hardcoded version for security and reproducibility
    # @see https://github.com/CyberTimon/RapidRAW/releases
    rapidraw_version: "1.5.5"
    rapidraw_rpm: "03_RapidRAW_v{{ rapidraw_version }}_ubuntu-22.04_x86_64.rpm"
    rapidraw_url: "https://github.com/CyberTimon/RapidRAW/releases/download/v{{ rapidraw_version }}/{{ rapidraw_rpm }}"
    rapidraw_sha256: "72e40924134dea7fbae45e2b7dfa75ea307e37e545b49d529c7ebad81c765b21"
    rapidraw_tmp: "/tmp/{{ rapidraw_rpm }}"
    # ART - hardcoded version for security and reproducibility
    # @see https://artraweditor.github.io/ | https://github.com/artraweditor/ART/releases
    art_version: "1.26.3"
    art_appimage: "ART-{{ art_version }}-x86_64.AppImage"
    art_url: "https://github.com/artraweditor/ART/releases/download/{{ art_version }}/{{ art_appimage }}"
    art_sha256: "6c072495b39bb30219bc71d656b6f7557830259e2f34b9f17d3d6ece3355eede"
    art_install_path: "/opt/{{ art_appimage }}"
    # Sony A7V (ILCE-7M5) rawspeed cameras.xml override — pinned to rawspeed develop HEAD.
    # @see Sony A7V bodge block in tasks: section below for full rationale and retirement steps.
    rawspeed_commit: "aa9028af9c563ebd4d8e6c5b74f05b0db1233d14"
    rawspeed_cameras_xml_url: "https://raw.githubusercontent.com/darktable-org/rawspeed/{{ rawspeed_commit }}/data/cameras.xml"
    rawspeed_cameras_xml_sha256: "d3d4d97f368c24da587350d68f51fe11fedfb307c6b2c960a5b6aa441c648d57"
    darktable_cameras_xml_path: "/usr/share/darktable/rawspeed/cameras.xml"
    darktable_cameras_xml_backup: "/usr/share/darktable/rawspeed/cameras.xml.dist"

  tasks:
    - name: Install Photography Packages
      ansible.builtin.package:
        name:
          # RAW processing
          - rawtherapee          # Advanced RAW processor with batch support
          - darktable            # Non-destructive RAW workflow + digital asset management
          # Pixel editing
          - gimp                 # Full-featured image editor for retouching and compositing
          # Photo management / cataloging
          - digikam              # Feature-rich photo manager with face recognition and tagging
          # Panorama and lens correction
          - hugin                # Panorama stitcher and lens calibration tool
          # Image viewing
          - geeqie               # Lightweight image viewer with RAW support and EXIF display
          # Metadata inspection
          - perl-Image-ExifTool  # CLI tool for reading/writing EXIF/IPTC/XMP metadata
        state: present
      tags: photography

    # ---------------------------------------------------------------------------
    # Sony A7V (ILCE-7M5) RAW format bodge
    #
    # Darktable in current Fedora releases lacks native Sony A7V (ILCE-7M5) ARW
    # support. The cameras.xml decoder + colour matrix entries landed in rawspeed
    # develop but have not yet shipped in a darktable release. Until that
    # happens we override the system cameras.xml with a pinned snapshot from
    # rawspeed develop.
    #
    # RETIREMENT: When Fedora ships a darktable RPM that includes A7V natively,
    # the final task in this block ("Notify if Stock Darktable Already Supports
    # Sony A7V") prints a notice on the next playbook run. At that point:
    #   1. Verify A7V .ARW files open in stock darktable (restore stock with
    #      `sudo mv {{ darktable_cameras_xml_backup }} {{ darktable_cameras_xml_path }}`
    #      and confirm)
    #   2. Delete this entire darktable-a7v block AND the rawspeed_*, darktable_cameras_xml_*
    #      vars from the vars: section above
    #
    # BUMPING the pin (if a newer rawspeed develop commit fixes more cases):
    #   1. curl -fsSL https://api.github.com/repos/darktable-org/rawspeed/commits/develop | jq -r .sha
    #   2. curl -fsSL https://raw.githubusercontent.com/darktable-org/rawspeed/<sha>/data/cameras.xml | sha256sum
    #   3. Update rawspeed_commit and rawspeed_cameras_xml_sha256 above
    #   4. Verify the new cameras.xml still contains a real ILCE-7M5 Camera entry
    #      with a non-placeholder ColorMatrix (NOT the 7460 -2365 -588 placeholder
    #      pasted in github issue #19917 comments)
    #
    # @see https://github.com/darktable-org/darktable/issues/19917
    # ---------------------------------------------------------------------------
    - name: Inspect Current Darktable Cameras.xml State
      ansible.builtin.stat:
        path: "{{ darktable_cameras_xml_path }}"
        checksum_algorithm: sha256
        get_checksum: true
      register: dt_cameras_state
      tags: darktable-a7v

    - name: Probe Pre-Patch Cameras.xml for Sony A7V Entry
      ansible.builtin.command:
        cmd: grep -q '<Camera make="SONY" model="ILCE-7M5">' {{ darktable_cameras_xml_path }}
      register: dt_a7v_grep
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: probe; rc 1 == "no match" is a valid state we branch on below
      when: dt_cameras_state.stat.exists
      tags: darktable-a7v

    - name: Back Up Stock Darktable Cameras.xml Before First Patch
      ansible.builtin.copy:
        src: "{{ darktable_cameras_xml_path }}"
        dest: "{{ darktable_cameras_xml_backup }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
        force: false  # Preserve the very first stock copy so dnf upgrades can be diffed against it
      when: dt_cameras_state.stat.exists
      tags: darktable-a7v

    - name: Patch Darktable Rawspeed Cameras.xml with Sony A7V Support
      ansible.builtin.get_url:
        url: "{{ rawspeed_cameras_xml_url }}"
        dest: "{{ darktable_cameras_xml_path }}"
        checksum: "sha256:{{ rawspeed_cameras_xml_sha256 }}"
        owner: root
        group: root
        mode: "0644"
      when: dt_cameras_state.stat.exists
      tags: darktable-a7v

    - name: Notify if Stock Darktable Already Supports Sony A7V (Retire Bodge)
      ansible.builtin.debug:
        msg: |
          The Fedora-shipped darktable cameras.xml ALREADY contained an
          ILCE-7M5 entry BEFORE this patch was applied, AND its sha256
          does not match our pinned snapshot. Fedora has likely caught
          up — this bodge is no longer needed.

          Action:
            1. Restore stock: sudo mv {{ darktable_cameras_xml_backup }} {{ darktable_cameras_xml_path }}
            2. Verify your A7V .ARW files open correctly in stock darktable
            3. Delete the darktable-a7v task block AND the rawspeed_* /
               darktable_cameras_xml_* vars from play-photography.yml
      when:
        - dt_cameras_state.stat.exists
        - dt_a7v_grep.rc == 0
        - dt_cameras_state.stat.checksum != rawspeed_cameras_xml_sha256
      tags: darktable-a7v

    # RapidRAW: GPU-accelerated RAW editor (wgpu/Vulkan). Installed as native RPM
    # rather than Flatpak to avoid NVIDIA DMA-buf blank window bug and Vulkan
    # driver version mismatch issues inside the Flatpak sandbox.
    - name: Check if RapidRAW is already installed at target version
      ansible.builtin.shell: |
        rpm -q rapidraw --queryformat '%{VERSION}' 2>/dev/null || echo "not-installed"
      register: rapidraw_installed_version
      changed_when: false
      tags: rapidraw

    - name: Download RapidRAW RPM
      ansible.builtin.get_url:
        url: "{{ rapidraw_url }}"
        dest: "{{ rapidraw_tmp }}"
        checksum: "sha256:{{ rapidraw_sha256 }}"
        mode: "0644"
      when: rapidraw_installed_version.stdout != rapidraw_version
      tags: rapidraw

    - name: Install RapidRAW RPM
      ansible.builtin.dnf:
        name: "{{ rapidraw_tmp }}"
        state: present
        disable_gpg_check: true  # Community release, no GPG key
      when: rapidraw_installed_version.stdout != rapidraw_version
      tags: rapidraw

    - name: Clean up RapidRAW RPM
      ansible.builtin.file:
        path: "{{ rapidraw_tmp }}"
        state: absent
      when: rapidraw_installed_version.stdout != rapidraw_version
      tags: rapidraw

    # /usr/local/bin precedes /usr/bin in PATH, so this shim is transparently
    # picked up by the desktop entry's `Exec=RapidRAW` and CLI invocation
    # without conflicting with the RPM-owned /usr/bin/RapidRAW. The shim forces
    # wgpu to use a hardware Vulkan ICD instead of Lavapipe/Dozen, which can
    # otherwise be auto-selected and cause severe sluggishness.
    # @see files/usr/local/bin/RapidRAW for the rationale.
    - name: Deploy RapidRAW Vulkan ICD Selector Shim
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/usr/local/bin/RapidRAW"
        dest: /usr/local/bin/RapidRAW
        owner: root
        group: root
        mode: "0755"
      tags: rapidraw

    - name: Check for newer RapidRAW release on GitHub
      ansible.builtin.uri:
        url: "https://api.github.com/repos/CyberTimon/RapidRAW/releases/latest"
        return_content: true
        headers:
          Accept: "application/vnd.github+json"
      register: rapidraw_latest
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: network check is advisory, should not block install
      tags: rapidraw

    - name: Warn if newer RapidRAW version is available
      ansible.builtin.debug:
        msg: >-
          RapidRAW update available: {{ rapidraw_latest.json.tag_name | regex_replace('^v', '') }}
          (pinned: {{ rapidraw_version }}).
          Update rapidraw_version and rapidraw_sha256 in play-photography.yml.
      when:
        - rapidraw_latest is succeeded
        - (rapidraw_latest.json.tag_name | regex_replace('^v', '')) != rapidraw_version
      tags: rapidraw

    # ART: Advanced RAW editor (ART fork of RawTherapee) with improved tone mapping
    # and masking. Installed as AppImage since no official RPM is available.
    - name: Check if ART is already installed at target version
      ansible.builtin.stat:
        path: "{{ art_install_path }}"
      register: art_stat
      changed_when: false
      tags: art

    - name: Download ART AppImage
      ansible.builtin.get_url:
        url: "{{ art_url }}"
        dest: "{{ art_install_path }}"
        checksum: "sha256:{{ art_sha256 }}"
        mode: "0755"
      when: not art_stat.stat.exists
      tags: art

    - name: Create ART symlink in /usr/local/bin
      ansible.builtin.file:
        src: "{{ art_install_path }}"
        dest: "/usr/local/bin/ART"
        state: link
      tags: art

    - name: Download ART icon
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/artraweditor/ART/master/rtdata/images/png/ART-logo-256.png"
        dest: /usr/share/pixmaps/ART.png
        mode: "0644"
      tags: art

    - name: Create ART desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/ART.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=ART
          Comment=Advanced RAW photo editor
          Exec=/usr/local/bin/ART %f
          Icon=ART
          Terminal=false
          Type=Application
          Categories=Graphics;Photography;RasterGraphics;
          MimeType=image/x-nikon-nef;image/x-canon-cr2;image/x-canon-crw;image/x-adobe-dng;image/x-fuji-raf;image/tiff;image/jpeg;
      tags: art

    - name: Check for newer ART release on GitHub
      ansible.builtin.uri:
        url: "https://api.github.com/repos/artraweditor/ART/releases/latest"
        return_content: true
        headers:
          Accept: "application/vnd.github+json"
      register: art_latest
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: network check is advisory, should not block install
      tags: art

    - name: Warn if newer ART version is available
      ansible.builtin.debug:
        msg: >-
          ART update available: {{ art_latest.json.tag_name }}
          (pinned: {{ art_version }}).
          Update art_version and art_sha256 in play-photography.yml.
      when:
        - art_latest is succeeded
        - art_latest.json.tag_name != art_version
      tags: art

    # Generic CWD-recursive RAW pruner. Same matching rules as
    # `ftp-camera --prune` but works in any directory and pairs RAW↔JPG
    # by filename stem alone, so JPGs and RAWs can live in different folders.
    - name: Install raw-prune helper script
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/home/.local/bin/raw-prune"
        dest: "/home/{{ user_login }}/.local/bin/raw-prune"
        owner: "{{ user_login }}"
        group: "{{ user_login }}"
        mode: "0755"
      tags: raw-prune

    # clip-scan — bulk-flag raw frames with excessive highlight / shadow
    # clipping by renaming with .wclip / .bclip sub-extensions. Decodes
    # Sony ARW via LibRaw (rawpy); falls back to Pillow for JPG-only
    # files. See CLAUDE/Plan/00040-raw-clipping-scanner/ for the full
    # design.
    #
    # rawpy install strategy: Fedora has no python3-rawpy package as of F43,
    # so we go straight to pip --user. Pillow IS in Fedora repos, but we
    # install it the same way for symmetry and to avoid an extra system task.
    - name: Probe python3-rawpy Availability in Fedora Repos
      ansible.builtin.command:
        cmd: dnf info python3-rawpy
      register: rawpy_dnf_probe
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: probe; rc != 0 == "package not in repos", a valid state we branch on
      tags: clip-scan

    - name: Install rawpy via System Package
      ansible.builtin.package:
        name: python3-rawpy
        state: present
      when: rawpy_dnf_probe.rc == 0
      tags: clip-scan

    - name: Install rawpy via pip --user (Fallback)
      ansible.builtin.pip:
        name: rawpy
        extra_args: --user
      become: true
      become_user: "{{ user_login }}"
      when: rawpy_dnf_probe.rc != 0
      tags: clip-scan

    - name: Install Pillow via System Package
      ansible.builtin.package:
        name: python3-pillow
        state: present
      tags: clip-scan

    - name: Install clip-scan Helper Script
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/home/.local/bin/clip-scan"
        dest: "/home/{{ user_login }}/.local/bin/clip-scan"
        owner: "{{ user_login }}"
        group: "{{ user_login }}"
        mode: "0755"
      tags: clip-scan

    - name: Display Installation Complete Message
      ansible.builtin.debug:
        msg: |
          Photography tools installed:
            rawtherapee          - RAW photo processor with advanced colour management
            darktable            - Non-destructive RAW workflow and digital asset manager
            gimp                 - Pixel editor for retouching and compositing
            digikam              - Photo cataloger with face recognition and tag management
            geeqie               - Lightweight image viewer with RAW support and EXIF display
            hugin                - Panorama stitching and lens calibration
            perl-Image-ExifTool  - CLI EXIF/IPTC/XMP metadata reader/writer (exiftool)
            rapidraw             - GPU-accelerated RAW editor (wgpu/Vulkan)
                                   NOTE: disable Compatibility Mode in Settings > Processing
                                   on first launch for full GPU performance
            ART                  - Advanced RAW editor (ART fork of RawTherapee)
                                   with improved tone mapping, masking, and local edits
            raw-prune            - Recursively delete RAWs in CWD with no matching JPG
                                   (run with --help for usage and --dry-run to preview)
            clip-scan            - Bulk-flag raw frames with excessive highlight/shadow
                                   clipping; renames matches with .wclip / .bclip
                                   sub-extensions. Dry-run by default — use --apply
                                   to commit. See --help.

          Sony A7V (ILCE-7M5) support: patched into darktable rawspeed cameras.xml
          (bodge — pinned to rawspeed develop {{ rawspeed_commit[:7] }}). Stock file backed up at
          {{ darktable_cameras_xml_backup }}. See the darktable-a7v task block above for
          retirement procedure when Fedora ships native A7V support.

          Launch from the applications menu, or on the command line:
            rawtherapee
            darktable
            gimp
            digikam
            geeqie
            hugin
            exiftool <file>
            rapidraw
            ART
            raw-prune --help
            clip-scan --help
