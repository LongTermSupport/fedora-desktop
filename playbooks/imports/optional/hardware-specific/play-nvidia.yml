#!/usr/bin/env ansible-playbook
---
#!/usr/bin/env ansible-playbook
# Install NVIDIA drivers using RPM Fusion (recommended method for Fedora 43)
# For RTX 500 Ada Generation and other modern NVIDIA GPUs
#
# Vulkan support is installed by default (required for modern gaming, AI apps, GPU compute)
# To disable, add to host_vars/localhost.yml: nvidia_install_vulkan: false
- hosts: desktop
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
  pre_tasks:
    - name: Load Fedora version config
      ansible.builtin.include_vars:
        file: "{{ root_dir }}/vars/fedora-version.yml"
  tasks:
    - name: Enable RPM Fusion repositories
      ansible.builtin.dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ fedora_version }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ fedora_version }}.noarch.rpm"
        state: present
        disable_gpg_check: true

    - name: Update system packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install NVIDIA driver packages
      ansible.builtin.dnf:
        name:
          - akmod-nvidia
          - xorg-x11-drv-nvidia-cuda # For CUDA/NVDEC/NVENC support
          - xorg-x11-drv-nvidia-cuda-libs
          - xorg-x11-drv-nvidia-power
          - libva-nvidia-driver # For hardware video acceleration (F43 rename of nvidia-vaapi-driver)
          - libva-utils # For vainfo testing tool
          - mesa-demos # For glxinfo testing tool
        state: present

    - name: Install Vulkan Support for NVIDIA
      ansible.builtin.dnf:
        name:
          # Core Vulkan runtime
          - vulkan-loader
          - vulkan-tools # For vulkaninfo, vulkan-smoketest
          # NVIDIA-specific Vulkan driver (ICD - Installable Client Driver)
          - xorg-x11-drv-nvidia-libs
          - nvidia-gpu-firmware
        state: present
      when: nvidia_install_vulkan | default(true) | bool

    # =========================================================================
    # Secure Boot MOK Signing Support
    # =========================================================================

    - name: Check if Secure Boot is enabled
      ansible.builtin.shell: mokutil --sb-state
      register: secure_boot_state
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: probe — secure boot may not be available

    - name: Install MOK prerequisites
      ansible.builtin.dnf:
        name:
          - mokutil
          - expect
          - kernel-devel
          - kernel-headers
        state: present

    - name: Validate MOK password is in vault
      ansible.builtin.assert:
        that:
          - mok_password is defined
        fail_msg: |
          ERROR: MOK password not found in vault!

          Please add 'mok_password' to your vault configuration:
          ansible-vault edit environment/localhost/host_vars/localhost.yml

          Add: mok_password: "your-password"

          This password will be used once during boot to enroll the MOK key.
      when: "'SecureBoot enabled' in secure_boot_state.stdout"

    - name: Generate akmods MOK signing key
      ansible.builtin.command: kmodgenca -a
      args:
        creates: /etc/pki/akmods/certs/public_key.der
      when: "'SecureBoot enabled' in secure_boot_state.stdout"

    - name: Check if akmods MOK key exists
      ansible.builtin.stat:
        path: /etc/pki/akmods/certs/public_key.der
      register: akmods_mok_key

    - name: Check if MOK is already enrolled
      ansible.builtin.shell: mokutil --test-key /etc/pki/akmods/certs/public_key.der
      register: mok_enrolled
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: probe — MOK key may not be enrolled yet
      when:
        - "'SecureBoot enabled' in secure_boot_state.stdout"
        - akmods_mok_key.stat.exists

    - name: Import MOK key for enrollment
      ansible.builtin.shell: |
        expect -c "
        spawn mokutil --import /etc/pki/akmods/certs/public_key.der
        expect \"input password:\"
        send \"{{ mok_password }}\r\"
        expect \"input password again:\"
        send \"{{ mok_password }}\r\"
        expect eof
        "
      when:
        - "'SecureBoot enabled' in secure_boot_state.stdout"
        - akmods_mok_key.stat.exists
        - "'is not enrolled' in mok_enrolled.stdout | default('')"
      register: mok_import

    - name: Display MOK enrollment password
      ansible.builtin.pause:
        prompt: |2

          ========================================================================
          IMPORTANT: SECURE BOOT MOK ENROLLMENT REQUIRED
          ========================================================================

          Your MOK enrollment password is: {{ mok_password }}

          MEMORIZE THIS PASSWORD NOW!

          After reboot:
          1. You will see a blue MOK Manager screen
          2. Select "Enroll MOK"
          3. Select "Continue"
          4. Select "Yes"
          5. Enter the password shown above: {{ mok_password }}
          6. Select "Reboot"

          The password will ONLY be needed this one time during enrollment.

          Press ENTER only after you have memorized the password...
          ========================================================================
      when:
        - "'SecureBoot enabled' in secure_boot_state.stdout"
        - mok_import is changed

    # =========================================================================
    # Kernel Module Build & Verification
    # =========================================================================
    # akmods builds the nvidia kernel module asynchronously via RPM scriptlet
    # on install/upgrade. We poll for the built .ko on disk (up to 5 minutes),
    # fall back to `akmods --force` on timeout, then report three version
    # states so the operator can tell at a glance whether a reboot is required:
    #   package  — what RPM is installed (target version)
    #   built    — what's on disk in /lib/modules/$(uname -r)/extra/nvidia/
    #   loaded   — what the running kernel currently has
    # If built != loaded, a reboot is required; otherwise the driver is live.

    - name: Get installed akmod-nvidia package version
      ansible.builtin.shell: rpm -q --qf '%{VERSION}\n' akmod-nvidia
      register: nvidia_pkg
      changed_when: false

    - name: Wait for akmods to build nvidia kernel module on disk (up to 5 min)
      ansible.builtin.shell: |
        set -e
        KMOD="/lib/modules/$(uname -r)/extra/nvidia/nvidia.ko.xz"
        [ -f "$KMOD" ] || KMOD="/lib/modules/$(uname -r)/extra/nvidia/nvidia.ko"
        for i in $(seq 1 60); do
          if [ -f "$KMOD" ]; then
            modinfo -F version "$KMOD"
            exit 0
          fi
          sleep 5
        done
        exit 1
      register: nvidia_kmod_poll
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: probe — retried below with akmods --force; that retry has no failed_when override and will halt the playbook if the build still fails

    - name: Force akmods rebuild if initial poll timed out
      # No failed_when override: if force-rebuild also fails, playbook halts.
      # Operator diagnostics:
      #   systemctl status akmods --no-pager -l
      #   journalctl -u akmods --no-pager --since "20 minutes ago"
      #   ls -la /lib/modules/$(uname -r)/extra/nvidia/
      ansible.builtin.shell: |
        set -e
        akmods --force
        dracut --force
        KMOD="/lib/modules/$(uname -r)/extra/nvidia/nvidia.ko.xz"
        [ -f "$KMOD" ] || KMOD="/lib/modules/$(uname -r)/extra/nvidia/nvidia.ko"
        modinfo -F version "$KMOD"
      register: nvidia_kmod_force
      when: nvidia_kmod_poll.rc != 0
      changed_when: true

    - name: Read built NVIDIA module version (on disk)
      ansible.builtin.shell: |
        KMOD="/lib/modules/$(uname -r)/extra/nvidia/nvidia.ko.xz"
        [ -f "$KMOD" ] || KMOD="/lib/modules/$(uname -r)/extra/nvidia/nvidia.ko"
        modinfo -F version "$KMOD" 2>/dev/null || echo NONE
      register: nvidia_built
      changed_when: false

    - name: Read loaded NVIDIA module version (running kernel)
      ansible.builtin.shell: |
        if [ -e /proc/driver/nvidia/version ]; then
          grep -oE '[0-9]+\.[0-9]+\.[0-9]+' /proc/driver/nvidia/version | head -1
        else
          echo NOT_LOADED
        fi
      register: nvidia_loaded
      changed_when: false

    - name: Display NVIDIA driver status
      ansible.builtin.debug:
        msg: |
          ========================================
          NVIDIA driver status
          ========================================
          Package (akmod-nvidia): {{ nvidia_pkg.stdout }}
          Built on disk:          {{ nvidia_built.stdout }}
          Loaded in kernel:       {{ nvidia_loaded.stdout }}
          {% if nvidia_loaded.stdout == nvidia_built.stdout %}

          Status: OK — built version is already loaded. No reboot required.
          {% elif nvidia_loaded.stdout == 'NOT_LOADED' %}

          Status: FRESH INSTALL — REBOOT REQUIRED to load driver {{ nvidia_built.stdout }}.
          {% else %}

          Status: UPGRADE — REBOOT REQUIRED to switch from {{ nvidia_loaded.stdout }} to {{ nvidia_built.stdout }}.
          {% endif %}
          ========================================

    - name: Reboot reminder (only when built != loaded)
      ansible.builtin.pause:
        prompt: |2

          ========================================================================
          REBOOT REQUIRED — NVIDIA driver {{ nvidia_built.stdout }} is built but not loaded
          ========================================================================
          {% if 'SecureBoot enabled' in secure_boot_state.stdout and mok_import is changed %}

          ALSO: complete MOK enrollment at boot (password shown earlier in this run).
          {% endif %}

          After reboot, verify with:
            nvidia-smi                                  # driver/GPU status
            cat /proc/driver/nvidia/version             # loaded driver version
            lsmod | grep nvidia                         # kernel module presence
          {% if nvidia_install_vulkan | default(true) | bool %}
            vulkaninfo | grep -i 'device name'         # Vulkan GPU
            vulkaninfo --summary                        # Vulkan devices list
          {% endif %}
            ./scripts/nvidia-status.bash                # full diagnostics

          Press ENTER to acknowledge.
          ========================================================================
      when: nvidia_loaded.stdout != nvidia_built.stdout
