#!/usr/bin/env ansible-playbook
---
#!/usr/bin/env ansible-playbook
- hosts: desktop
  name: GSettings
  tasks:
    - name: Apply Gsettings
      become: true
      become_user: "{{ user_login }}"
      # dbus-run-session provides a temporary D-Bus session so gsettings works
      # without GNOME currently running (e.g. SSH sessions, fresh installs)
      ansible.builtin.shell: "dbus-run-session -- {{ item }}"
      loop:
        # disable caps lock key
        - gsettings set org.gnome.desktop.input-sources xkb-options \[\'caps:none\'\]
        # disable middle-click closing tabs in Ptyxis terminal
        - gsettings set org.gnome.Ptyxis tab-middle-click 'nothing'
