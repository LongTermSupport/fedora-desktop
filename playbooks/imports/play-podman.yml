#!/usr/bin/env ansible-playbook
---
#!/usr/bin/env ansible-playbook
- hosts: desktop
  name: Install Podman and podman-compose
  become: false
  vars:
    root_dir: "{{ inventory_dir }}/../../"
  tasks:
    - name: Install Podman
      become: true
      ansible.builtin.dnf:
        name:
          - podman
        state: present

    - name: Install podman-compose (Docker Compose compatibility)
      ansible.builtin.pip:
        name: podman-compose
        state: present
        extra_args: --user

    - name: Check if user D-Bus session is available
      ansible.builtin.command: systemctl --user status
      register: dbus_session_check
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: probe — D-Bus session may not exist yet

    - name: Enable Podman Socket for Docker Compatibility (Optional)
      ansible.builtin.systemd:
        name: podman.socket
        state: started
        enabled: true
        scope: user
      when: dbus_session_check.rc == 0

    - name: Verify Podman Install
      ansible.builtin.command: podman info
      changed_when: false

    - name: Show Podman Version
      ansible.builtin.debug:
        msg: "Podman installed successfully. Run 'podman --version' to verify."
