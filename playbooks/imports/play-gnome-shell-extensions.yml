#!/usr/bin/env ansible-playbook
---
# Customisations for Gnome Shell - only worth doing if you actually use Gnome
- hosts: desktop
  name: Gnome Shell Extensions
  become: true
  vars:
    root_dir: "{{ inventory_dir }}/../../"
  tasks:
    - name: Install Gnome Shell Extension Installer
      ansible.builtin.copy:
        src: "{{ root_dir }}/files/usr/bin/gnome-shell-extension-installer"
        dest: /usr/bin/gnome-shell-extension-installer
        mode: "0755"

    - name: Install DNF packages
      ansible.builtin.dnf:
        name:
          - xprop
          - gnome-shell-extension-dash-to-dock
          # Note: just-perfection is installed via ID below as DNF package may be outdated

    - name: Install Gnome Shell Extensions Not Included with DNF
      become: false
      ansible.builtin.command: gnome-shell-extension-installer --yes --restart-shell {{ item.id }}
      loop:
        # All verified compatible with GNOME Shell 48 (Fedora 42)
        - name: Blur my Shell
          id: 3193
          # https://extensions.gnome.org/extension/3193/blur-my-shell/
        - name: Vitals
          id: 1460
          # https://extensions.gnome.org/extension/1460/vitals/
        - name: AppIndicator and KStatusNotifierItem Support
          id: 615
          # https://extensions.gnome.org/extension/615/appindicator-support/
        - name: Clipboard Indicator
          id: 779
          # https://extensions.gnome.org/extension/779/clipboard-indicator/
        - name: Just Perfection
          id: 3843
          # https://extensions.gnome.org/extension/3843/just-perfection/
        - name: Tiling Shell
          id: 7065
          # https://extensions.gnome.org/extension/7065/tiling-shell/
        - name: Space Bar
          id: 5090
          # https://extensions.gnome.org/extension/5090/space-bar/

    - name: Deploy Custom Extension - Workspace Names in Overview
      become: true
      become_user: "{{ user_login }}"
      ansible.builtin.copy:
        src: "{{ root_dir }}/extensions/workspace-names-overview@fedora-desktop/"
        dest: "/home/{{ user_login }}/.local/share/gnome-shell/extensions/workspace-names-overview@fedora-desktop/"
        mode: '0755'

    - name: Enable Workspace Names in Overview Extension
      become: true
      become_user: "{{ user_login }}"
      ansible.builtin.shell:
        cmd: |
          export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
          gnome-extensions enable workspace-names-overview@fedora-desktop
      changed_when: false
      failed_when: false  # FAIL-FAST-OK: GNOME session may not be active during playbook run

    # Default Space Bar behaviour is: first click opens Overview, second click
    # selects the workspace. We want a single click to switch directly.
    # Use dconf write (not gsettings set) because the Space Bar schema is
    # installed under the extension dir, not the system schema path — gsettings
    # would refuse with "No such schema" inside a fresh dbus-run-session.
    - name: Configure Space Bar - Single Click Switches Workspace
      become: true
      become_user: "{{ user_login }}"
      ansible.builtin.command:
        cmd: dbus-run-session -- dconf write /org/gnome/shell/extensions/space-bar/behavior/toggle-overview false
      changed_when: false
